<!DOCTYPE html>
<html>
<head>
    <title>IPL Auction Game</title>
</head>
<body>

<h1>IPL Auction Game</h1>
<h3>Created by RAMCHARAN</h3>

<p>Player: {{ player.name }} (Base: {{ player.base_price }})</p>

<form action="/bid" method="POST">
    <select name="team">
        {% for team in teams %}
        <option value="{{ team }}">{{ team }}</option>
        {% endfor %}
    </select>

    <input type="number" name="amount" placeholder="Bid">
    <button type="submit">Bid</button>
</form>

<a href="/next">Next Player</a>

<h2>Teams</h2>
{% for team, data in teams.items() %}
    <h3>{{ team }} ({{ data.budget }})</h3>
    <ul>
        {% for p in data.players %}
        <li>{{ p }}</li>
        {% endfor %}
    </ul>
{% endfor %}

</body>
</html>
